<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BEM</title>
<script>
(function() {
    var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    var base = '/bem.info';
    var target = lang.indexOf('ru') === 0 || lang.indexOf('uk') === 0 ? base + '/ru/' : base + '/en/';
    window.location.replace(target);
})();
</script>
<noscript>
<meta http-equiv="refresh" content="0; url=/bem.info/en/">
</noscript>
</head>
<body>
<p><a href="/bem.info/en/">English</a> | <a href="/bem.info/ru/">Русский</a></p>
</body>
</html>
